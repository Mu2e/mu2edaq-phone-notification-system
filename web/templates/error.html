{% extends "base.html" %}
{% block title %}{{ error.code }} · Mu2e DAQ Notify{% endblock %}
{% block content %}
<div class="rounded-lg border border-slate-800 bg-slate-900 p-8 max-w-xl mx-auto mt-12 text-center">
  <div class="text-5xl font-bold text-slate-600">{{ error.code }}</div>
  <p class="mt-3 text-slate-300">{{ error.description }}</p>
  <a href="{{ url_for('web.dashboard') }}" class="inline-block mt-4 text-sky-400 hover:underline">Back to dashboard</a>
</div>
{% endblock %}
